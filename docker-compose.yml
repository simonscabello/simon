services:
  postgres:
    image: postgres:16-alpine
    container_name: simon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-simon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-simon}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-simon} -d ${DB_NAME:-simon}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: simon-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-simon}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-simon}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
